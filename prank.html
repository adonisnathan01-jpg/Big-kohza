<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers Horizon - Boutique Officielle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .image-container {
            background-color: #ff5722;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #333;
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .shoe-img {
            width: 85%;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            transform: rotate(-15px);
        }
        .details {
            padding: 25px;
        }
        .title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 8px;
        }
        .category {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .price {
            font-size: 1.8rem;
            color: #ff5722;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .size-selector {
            margin-bottom: 25px;
        }
        .size-title {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .sizes {
            display: flex;
            gap: 10px;
        }
        .size-btn {
            border: 2px solid #ddd;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .size-btn:hover {
            border-color: #333;
        }
        .size-btn.active {
            background: #333;
            color: white;
            border-color: #333;
        }
        .buy-btn {
            width: 100%;
            background: #ff5722;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .buy-btn:hover {
            background: #e64a19;
        }
        #message-confirmation {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            color: #2e7d32;
            text-align: center;
            border-radius: 6px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="image-container">
            <span class="badge">Édition Limitée</span>
            <!-- Utilisation d'une image d'exemple de chaussure de sport transparente -->
            <img class="shoe-img" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format&fit=crop&q=60" alt="Chaussure Horizon">
        </div>
        
        <div class="details">
            <p class="category">Running / Sport</p>
            <h1 class="title">Aero-Volt X1</h1>
            <div class="price">129,99 €</div>
            
            <div class="size-selector">
                <p class="size-title">Sélectionner la pointure :</p>
                <div class="sizes">
                    <button class="size-btn" onclick="selectSize(this)">41</button>
                    <button class="size-btn" onclick="selectSize(this)">42</button>
                    <button class="size-btn active" onclick="selectSize(this)">43</button>
                    <button class="size-btn" onclick="selectSize(this)">44</button>
                </div>
            </div>
            
            <button class="buy-btn" onclick="ajouterAuPanier()">Ajouter au panier</button>
            <div id="message-confirmation">Le produit a bien été ajouté à votre panier !</div>
        </div>
    </div>

    <script>
        // Gère la sélection visuelle de la taille
        function selectSize(button) {
            const buttons = document.querySelectorAll('.size-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }

        // Simule l'ajout au panier
        function ajouterAuPanier() {
            const message = document.getElementById('message-confirmation');
            message.style.display = 'block';
            
            // Cache le message automatiquement après 3 secondes
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }
    </script>

</body>
</html>
