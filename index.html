<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL ERROR</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            overflow: hidden;
        }
        .console-line {
            opacity: 0;
            white-space: nowrap;
            overflow: hidden;
            margin: 5px 0;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .success {
            color: #00ff00;
        }
        #alert-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: black;
            border: 3px solid red;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px red;
            z-index: 100;
        }
        #alert-box h1 {
            color: red;
            font-size: 2em;
            margin-bottom: 20px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="console"></div>

    <div id="alert-box">
        <h1>
