<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaGames Shop - Vos jeux au meilleur prix</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #161623;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        h1 { color: #e94560; }
        
        /* Zone Panier */
        .cart-status {
            background: #e94560;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Grille des Jeux */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .game-card {
            background: #161623;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2a40;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .game-thumb {
            width: 100%;
            height: 150px;
            background: #2a2a40;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #888;
        }
        .game-title { font-size: 1.2rem; margin-bottom: 10px; }
        .game-price { color: #00ffcc; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
        
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn:hover { background: #ff5e7e; }

        /* Fenêtre de paiement (Cachée par défaut) */
        .checkout-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #161623;
            border: 2px solid #e94560;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            z-index: 10;
        }
        .modal-title { margin-bottom: 20px; color: #00ffcc; text-align: center; }
        .cart-items-list { margin-bottom: 20px; max-height: 150px; overflow-y: auto; background: #1a1a2e; padding: 10px; border-radius: 6px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        
        /* Boutons de paiement Mobile Money */
        .payment-methods {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .pay-option {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #2a2a40;
            background: #1a1a2e;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }
        .pay-option.wave { border-color: #1d9bf0; color: #1d9bf0; }
        .pay-option.orange { border-color: #ff6600; color: #ff6600; }
        .pay-option:hover { transform: scale(1.03); }

        .close-btn { background: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>GigaGames</h1>
        <div class="cart-status" onclick="ouvrirPaiement()">🛒 Panier (<span id="cart-count">0</span>)</div>
    </header>

    <!-- Section Catalogue de jeux -->
    <div class="games-grid">
        <div class="game-card">
            <div class="game-thumb">GTA V</div>
            <h3 class="game-title">Grand Theft Auto V</h3>
            <div class="game-price">10 000 FCFA</div>
            <button class="btn" onclick="ajouterAuPanier('GTA V', 10000)">Ajouter au panier</button>
        </div>

        <div class="game-card">
            <div class="game-thumb">FC 26</div>
            <h3 class="game-title">EA Sports FC 26</h3>
            <div class="game-price">35 000 FCFA</div>
            <button class="btn" onclick="ajouterAuPanier('EA Sports FC 26', 35000)">Ajouter au panier</button>
        </div>

        <div class="game-card">
            <div class="game-thumb">Call of Duty</div>
            <h3 class="game-title">CoD: Black Ops 6</h3>
            <div class="game-price">40 000 FCFA</div>
            <button class="btn" onclick="ajouterAuPanier('CoD: Black Ops 6', 40000)">Ajouter au panier</button>
        </div>
    </div>

    <!-- Fenêtre de Finalisation de la Commande -->
    <div id="checkoutModal" class="checkout-modal">
        <h2 class="modal-title">Finaliser ma commande</h2>
        
        <div class="cart-items-list" id="modalItems">
            <!-- Les articles ajoutés apparaîtront ici -->
        </div>

        <h3 style="margin-bottom: 20px;">Total : <span id="modalTotal" style="color:#00ffcc;">0</span> FCFA</h3>
        
        <p style="font-size: 0.9rem; color: #aaa;">Sélectionnez votre moyen de paiement Mobile Money :</p>
        <div class="payment-methods">
            <button class="pay-option wave" onclick="simulerPaiement('Wave')">WAVE</button>
            <button class="pay-option orange" onclick="simulerPaiement('Orange Money')">Orange Money</button>
        </div>

        <button class="btn close-btn" onclick="fermerPaiement()">Continuer mes achats</button>
    </div>

    <script>
        // Tableau stockant les articles du panier
        let panier = [];

        function ajouterAuPanier(nomJeu, prixJeu) {
            // Ajout du jeu sélectionné au tableau
            panier.push({ nom: nomJeu, prix: prixJeu });
            
            // Mise à jour du compteur visuel du panier
            document.getElementById('cart-count').innerText = panier.length;
            
            alert(`${nomJeu} a bien été ajouté au panier ! Vous pouvez continuer à ajouter d'autres articles.`);
        }

        function ouvrirPaiement() {
            if (panier.length === 0) {
                alert("Votre panier est vide. Ajoutez des articles d'abord !");
                return;
            }

            const modalItems = document.getElementById('modalItems');
            const modalTotal = document.getElementById('modalTotal');
            
            // On vide l'affichage précédent
            modalItems.innerHTML = '';
            
            let total = 0;
            
            // On génère la liste des articles dans la fenêtre
            panier.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${item.nom}</span> <span>${item.prix} FCFA</span>`;
                modalItems.appendChild(div);
                total += item.prix;
            });

            modalTotal.innerText = total.toLocaleString('fr-FR');
            document.getElementById('checkoutModal').style.display = 'block';
        }

        function fermerPaiement() {
            document.getElementById('checkoutModal').style.display = 'none';
        }

        function simulerPaiement(methode) {
            alert(`Connexion sécurisée à l'application ${methode} en cours...\nMerci pour votre achat virtuel !`);
            // Réinitialise le panier après achat
            panier = [];
            document.getElementById('cart-count').innerText = 0;
            fermerPaiement();
        }
    </script>
</body>
</html>
