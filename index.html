<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Store - Boutique de Jeux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gaming Store</h1>
        <p>Vos jeux préférés au meilleur prix</p>
    </header>

    <div class="conteneur-principal">
        
        <!-- Grille des Jeux -->
        <section class="zone-jeux">
            <h2>Jeux Disponibles</h2>
            <div class="grille-jeux">
                
                <!-- Jeu 1 -->
                <div class="jeu-carte">
                    <img src="fortnite.jpg" alt="Pack Fortnite" class="jeu-image">
                    <div class="jeu-info">
                        <h3>Fortnite Pack Special</h3>
                        <p class="prix">10 000 FCFA</p>
                        <button class="btn-ajouter" onclick="ajouterAuPanier('Fortnite Pack Special', 10000)">Ajouter au panier</button>
                    </div>
                </div>

                <!-- Jeu 2 -->
                <div class="jeu-carte">
                    <img src="gta.jpg" alt="GTA V" class="jeu-image">
                    <div class="jeu-info">
                        <h3>GTA V Premium Edition</h3>
                        <p class="prix">15 000 FCFA</p>
                        <button class="btn-ajouter" onclick="ajouterAuPanier('GTA V Premium Edition', 15000)">Ajouter au panier</button>
                    </div>
                </div>

                <!-- Jeu 3 -->
                <div class="jeu-carte">
                    <img src="fifa.jpg" alt="EA Sports FC" class="jeu-image">
                    <div class="jeu-info">
                        <h3>EA Sports FC 26</h3>
                        <p class="prix">35 000 FCFA</p>
                        <button class="btn-ajouter" onclick="ajouterAuPanier('EA Sports FC 26', 35000)">Ajouter au panier</button>
                    </div>
                </div>

                <!-- Jeu 4 -->
                <div class="jeu-carte">
                    <img src="cod.jpg" alt="Call of Duty" class="jeu-image">
                    <div class="jeu-info">
                        <h3>Call of Duty</h3>
                        <p class="prix">40 000 FCFA</p>
                        <button class="btn-ajouter" onclick="ajouterAuPanier('Call of Duty', 40000)">Ajouter au panier</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- Zone du Panier (à droite sur grand écran) -->
        <aside class="zone-panier">
            <div class="panier-boite">
                <h2>Mon Panier</h2>
                <ul id="liste-panier">
                    <!-- Les éléments s'ajouteront ici avec le JavaScript -->
                </ul>
                <hr>
                <p class="total-texte">Total : <span id="total-panier">0</span> FCFA</p>
                <button id="btn-commander" onclick="validerCommande()">Passer la commande</button>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
<header>
    <h1>Nathan Gaming</h1>
    <p>La boutique de jeux préférée des gamers !</p>
</header>
